version: 2

models:
  - name: stg_customers
    description: One row per customer. Cleaned and renamed from the dim_customer seed.
    columns:
      - name: customer_sk
        description: Surrogate key for the customer.
        data_tests:
          - unique
          - not_null
      - name: email
        description: Customer email, lowercased for consistent matching.
        data_tests:
          - not_null
      - name: loyalty_tier
        description: Loyalty program tier the customer belongs to.
        data_tests:
          - accepted_values:
              arguments:
                values: ['Bronze', 'Silver', 'Gold', 'Platinum']

  - name: stg_dates
    description: One row per calendar day, used as the date dimension grain.
    columns:
      - name: date_sk
        description: Surrogate key for the date.
        data_tests:
          - unique
          - not_null
      - name: calendar_date
        data_tests:
          - unique
          - not_null

  - name: stg_products
    description: One row per product. Cleaned and renamed from the dim_product seed.
    columns:
      - name: product_sk
        description: Surrogate key for the product.
        data_tests:
          - unique
          - not_null
      - name: list_price
        data_tests:
          - not_null

  - name: stg_stores
    description: One row per store location.
    columns:
      - name: store_sk
        description: Surrogate key for the store.
        data_tests:
          - unique
          - not_null

  - name: stg_sales
    description: One row per sales transaction line.
    columns:
      - name: sales_id
        description: Unique identifier for a sales line item.
        data_tests:
          - not_null
      - name: date_sk
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('stg_dates')
                field: date_sk
      - name: store_sk
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('stg_stores')
                field: store_sk
      - name: product_sk
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('stg_products')
                field: product_sk
      - name: customer_sk
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('stg_customers')
                field: customer_sk
      - name: net_amount
        description: Final transaction amount after discount.
        data_tests:
          - not_null

  - name: stg_returns
    description: One row per returned line item, referencing the original sale.
    columns:
      - name: sales_id
        data_tests:
          - not_null
      - name: refund_amount
        data_tests:
          - not_null
